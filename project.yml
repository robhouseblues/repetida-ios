name: Repetida
options:
  bundleIdPrefix: com.tsikada.repetida
  developmentLanguage: pt-BR
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  Repetida:
    type: application
    platform: iOS
    sources:
      - path: Repetida
        excludes:
          - Resources/**
          - Assets.xcassets/**
      - path: Repetida/Resources
        buildPhase: resources
      - path: Repetida/Assets.xcassets
        buildPhase: resources
      - path: Repetida/Localization/Localizable.xcstrings
        buildPhase: resources
    info:
      path: Repetida/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Dark
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tsikada.repetida.app
      INFOPLIST_KEY_CFBundleDisplayName: Repetida
      INFOPLIST_KEY_CFBundleDevelopmentRegion: pt-BR
      SWIFT_EMIT_LOC_STRINGS: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      GENERATE_INFOPLIST_FILE: YES
      TARGETED_DEVICE_FAMILY: "1,2"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
    dependencies: []

  RepetidaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RepetidaTests
      - path: Repetida/Resources
        buildPhase: resources
    dependencies:
      - target: Repetida
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tsikada.repetida.app.tests
      GENERATE_INFOPLIST_FILE: YES

schemes:
  Repetida:
    build:
      targets:
        Repetida: all
        RepetidaTests: [test]
    run:
      environmentVariables:
        IDEPreferLogStreaming: YES
    test:
      targets:
        - RepetidaTests
      environmentVariables:
        IDEPreferLogStreaming: YES
